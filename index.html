<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-lg rounded-2xl p-8 text-center w-[90%] max-w-md">

    <h1 class="text-2xl font-bold text-green-600 mb-4">
      System Connection Test
    </h1>

    <!-- STATUS -->
    <p id="status" class="text-gray-700">
      Checking connection...
    </p>

    <!-- DATABASE STATUS -->
    <p id="dbStatus" class="mt-3 font-medium"></p>

    <!-- STORAGE STATUS -->
    <p id="storageStatus" class="mt-3 font-medium"></p>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Config -->
  <script src="js/config.js"></script>

  <!-- Main -->
  <script src="js/main-v3.js"></script>

</body>
</html>
