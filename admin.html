<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liyog Admin Upload</title>

  <link rel="stylesheet" href="https://liyx-dev.github.io/whatsapp-sales/output.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .hidden-file {
      display: none;
    }

    .preview-grid img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 16px;
    }

    .drop-zone.dragover {
      border-color: var(--color-liyog-green);
      background: rgba(40,164,40,.05);
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 14px 18px;
      border-radius: 14px;
      color: white;
      z-index: 9999;
      box-shadow: 0 12px 30px rgba(0,0,0,.15);
    }

    .toast.success {
      background: #28A428;
    }

    .toast.error {
      background: #FF3B30;
    }
  </style>
</head>
<body>

<div class="min-h-screen p-4 md:p-8">
  <div class="max-w-5xl mx-auto">

    <!-- HEADER -->
    <div class="glass rounded-3xl px-6 py-5 mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-liyog-black">Product Upload</h1>
        <p class="text-sm text-slate-500">Create premium product listings</p>
      </div>
      <div class="bg-liyog-green text-white px-4 py-2 rounded-full text-sm font-semibold">
        Admin
      </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-6">

      <!-- FORM -->
      <div class="card-premium p-6 animate-fade-up">
        <h2 class="text-xl font-semibold mb-5">Product Details</h2>

        <div class="space-y-4">
          <input id="name" class="input-premium" placeholder="Product name">
          <input id="price" class="input-premium" placeholder="Price">
          <select id="category" class="input-premium"></select>
          <input id="tags" class="input-premium" placeholder="Tags (comma separated)">
          <input id="whatsapp" class="input-premium" placeholder="WhatsApp number">
          <input id="youtube" class="input-premium" placeholder="Optional YouTube URL">
          <textarea id="description" class="input-premium min-h-[120px]" placeholder="Product description"></textarea>
        </div>

        <!-- IMAGE UPLOAD -->
        <div class="mt-6">
          <label class="font-semibold text-sm mb-2 block">Upload Images (max 10)</label>
          <div id="dropZone" class="drop-zone border-2 border-dashed border-slate-300 rounded-3xl p-8 text-center cursor-pointer">
            <p class="text-slate-500">Tap or drag images here</p>
            <input id="images" type="file" multiple accept="image/*" class="hidden-file">
          </div>
          <div id="preview" class="preview-grid grid grid-cols-3 gap-3 mt-4"></div>
        </div>

        <!-- VIDEO -->
        <div class="mt-6">
          <label class="font-semibold text-sm mb-2 block">Optional Video</label>
          <input id="video" type="file" accept="video/*" class="input-premium">
        </div>

        <button onclick="submitProduct()" class="btn-primary w-full mt-8">
          Upload Product
        </button>
      </div>

      <!-- LIVE PREVIEW -->
      <div class="card-premium p-6 animate-fade-up">
        <h2 class="text-xl font-semibold mb-5">Live Preview</h2>

        <div id="liveCard" class="rounded-3xl overflow-hidden border border-slate-100">
          <img id="liveImage" src="https://placehold.co/600x400" class="w-full h-64 object-cover">
          <div class="p-5">
            <h3 id="liveName" class="font-bold text-lg">Product Name</h3>
            <p id="livePrice" class="text-liyog-green font-semibold mt-2">₦0</p>
            <p id="liveDesc" class="text-sm text-slate-500 mt-3">Description preview...</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const supabaseUrl = "https://ugffezktrojjhfbaxrrq.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnZmZlemt0cm9qamhmYmF4cnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODg3NzIsImV4cCI6MjA5MTI2NDc3Mn0.gzFuLSj225QRnxdwyrH25Xpe1YZqPiK7fp_nrsETsW8";

  if (!window.supabase) {
    alert("Supabase library failed to load.");
    return;
  }

  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const els = {
    name: document.getElementById("name"),
    price: document.getElementById("price"),
    category: document.getElementById("category"),
    tags: document.getElementById("tags"),
    whatsapp: document.getElementById("whatsapp"),
    youtube: document.getElementById("youtube"),
    description: document.getElementById("description"),
    images: document.getElementById("images"),
    video: document.getElementById("video"),
    dropZone: document.getElementById("dropZone"),
    preview: document.getElementById("preview"),
    liveImage: document.getElementById("liveImage"),
    liveName: document.getElementById("liveName"),
    livePrice: document.getElementById("livePrice"),
    liveDesc: document.getElementById("liveDesc")
  };

  let selectedImages = [];

  function toast(msg, type = "success") {
    const div = document.createElement("div");
    div.className = `toast ${type}`;
    div.textContent = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  function updateLive() {
    els.liveName.textContent = els.name.value || "Product Name";
    els.livePrice.textContent = els.price.value || "₦0";
    els.liveDesc.textContent =
      els.description.value || "Description preview...";
  }

  async function loadCategories() {
    try {
      els.category.innerHTML = `<option value="">Loading...</option>`;

      const { data, error } = await supabaseClient
        .from("categories")
        .select("id,name")
        .order("name");

      console.log("CATEGORY DATA:", data, error);

      if (error) throw error;

      els.category.innerHTML = `<option value="">Select category</option>`;

      if (!data || data.length === 0) {
        els.category.innerHTML = `<option value="">No categories found</option>`;
        return;
      }

      data.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat.id;
        option.textContent = cat.name;
        els.category.appendChild(option);
      });

    } catch (error) {
      console.error("Category error:", error);
      els.category.innerHTML = `<option value="">Failed to load</option>`;
      toast("Failed to load categories", "error");
    }
  }

  function handleFiles(fileList) {
    const files = Array.from(fileList)
      .filter(file => file.type.startsWith("image/"))
      .slice(0, 10);

    selectedImages = files;
    els.preview.innerHTML = "";

    files.forEach((file, index) => {
      const reader = new FileReader();

      reader.onload = e => {
        const img = document.createElement("img");
        img.src = e.target.result;
        els.preview.appendChild(img);

        if (index === 0) {
          els.liveImage.src = e.target.result;
        }
      };

      reader.readAsDataURL(file);
    });

    console.log("Selected files:", selectedImages);
  }

  els.dropZone.addEventListener("click", () => {
    els.images.click();
  });

  els.dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    els.dropZone.classList.add("dragover");
  });

  els.dropZone.addEventListener("dragleave", () => {
    els.dropZone.classList.remove("dragover");
  });

  els.dropZone.addEventListener("drop", e => {
    e.preventDefault();
    els.dropZone.classList.remove("dragover");
    handleFiles(e.dataTransfer.files);
  });

  els.images.addEventListener("change", e => {
    handleFiles(e.target.files);
  });

  ["name", "price", "description"].forEach(id => {
    els[id].addEventListener("input", updateLive);
  });

  window.submitProduct = async function () {
    try {
      console.log("Submitting...");
      toast("Uploading product...");

      const imageUrls = [];

      for (const file of selectedImages) {
        const response = await fetch(`${supabaseUrl}/functions/v1/generate-r2-upload-url`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${supabaseKey}`
          },
          body: JSON.stringify({
            fileName: file.name,
            fileType: file.type,
            folder: "products"
          })
        });

        const meta = await response.json();
        console.log("Upload meta:", meta);

        await fetch(meta.uploadUrl, {
          method: "PUT",
          headers: {
            "Content-Type": file.type
          },
          body: file
        });

        imageUrls.push(meta.publicUrl);
      }

      let uploadedVideo = null;
      const videoFile = els.video.files[0];

      if (videoFile) {
        const response = await fetch(`${supabaseUrl}/functions/v1/generate-r2-upload-url`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${supabaseKey}`
          },
          body: JSON.stringify({
            fileName: videoFile.name,
            fileType: videoFile.type,
            folder: "products"
          })
        });

        const meta = await response.json();

        await fetch(meta.uploadUrl, {
          method: "PUT",
          headers: {
            "Content-Type": videoFile.type
          },
          body: videoFile
        });

        uploadedVideo = meta.publicUrl;
      }

      const { error } = await supabaseClient.rpc("create_product", {
        p_name: els.name.value,
        p_price: els.price.value,
        p_image_urls: imageUrls,
        p_description: els.description.value,
        p_whatsapp_number: els.whatsapp.value,
        p_category_id: els.category.value || null,
        p_tags: els.tags.value,
        p_video_url: uploadedVideo,
        p_youtube_url: els.youtube.value || null,
        p_sort_order: 0
      });

      if (error) throw error;

      toast("Product uploaded successfully");
      console.log("Upload complete");

    } catch (error) {
      console.error(error);
      toast(error.message || "Upload failed", "error");
    }
  };

  updateLive();
  await loadCategories();
});
</script>
</body>
</html>
